<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0b0f1a 0%, #0d1525 20%, #111b33 40%, #0f1a30 60%, #0b1222 80%, #0b0f1a 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
    .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; }
    .glass-input:focus { background: rgba(255,255,255,0.08); border-color: rgba(129,140,248,0.6); box-shadow: 0 0 0 3px rgba(129,140,248,0.15); }
    .glass-input::placeholder { color: rgba(148,163,184,0.6); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .toast { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #818cf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-40 -left-40 h-96 w-96 rounded-full bg-indigo-500/10 blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 h-96 w-96 rounded-full bg-violet-500/10 blur-3xl"></div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="spinner"></div>
  </div>

  <!-- AUTH SCREEN (LOGIN / SIGNUP) -->
  <div id="auth-screen" class="hidden fixed inset-0 z-40 items-center justify-center px-4">
    <div class="glass rounded-3xl p-8 max-w-md w-full fade-in">
      <div class="text-center mb-6">
        <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 shadow-xl shadow-indigo-500/20 mb-4">
          <svg class="h-8 w-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 2h16v20l-4-2-4 2-4-2-4 2z" /><path d="M8 10h8M8 14h5" />
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white to-indigo-200 bg-clip-text text-transparent">Receipt Manager</h1>
        <p class="text-sm text-slate-400 mt-1" id="auth-subtitle">Sign in to sync your receipts</p>
      </div>

      <!-- Tab switcher -->
      <div class="grid grid-cols-2 gap-2 mb-6 p-1 rounded-xl bg-white/5">
        <button id="tab-login" class="rounded-lg py-2 text-sm font-semibold transition-all bg-indigo-600 text-white">Login</button>
        <button id="tab-signup" class="rounded-lg py-2 text-sm font-semibold transition-all text-slate-400 hover:text-white">Sign Up</button>
      </div>

      <form id="auth-form" class="space-y-4">
        <div id="name-field" class="hidden">
          <label class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-slate-400">Display Name</label>
          <input type="text" id="auth-name" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="Your name" />
        </div>
        <div>
          <label class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-slate-400">Email</label>
          <input type="email" id="auth-email" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="you@example.com" required />
        </div>
        <div>
          <label class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
          <input type="password" id="auth-password" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="••••••••" required minlength="6" />
          <p class="mt-1 text-xs text-slate-500" id="password-hint">Minimum 6 characters</p>
        </div>

        <button type="submit" id="auth-submit" class="w-full rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-3 text-sm font-bold text-white shadow-lg shadow-indigo-500/25 transition-all hover:shadow-indigo-500/40">
          Login
        </button>

        <div class="text-center">
          <button type="button" id="forgot-password" class="text-xs text-slate-400 hover:text-indigo-400 transition-colors">Forgot password?</button>
        </div>
      </form>

      <div id="auth-error" class="hidden mt-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-sm text-red-300"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden relative z-10 mx-auto max-w-4xl px-4 py-8">
    <header class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-4">
        <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 shadow-xl shadow-indigo-500/20">
          <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 2h16v20l-4-2-4 2-4-2-4 2z" /><path d="M8 10h8M8 14h5" />
          </svg>
        </div>
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white to-indigo-200 bg-clip-text text-transparent">Receipt Manager</h1>
          <p class="text-sm text-slate-400 flex items-center gap-2 flex-wrap">
            <span id="user-greeting">Hi, User</span>
            <span id="sync-indicator" class="hidden items-center gap-1.5">
              <span class="sync-dot bg-emerald-400"></span>
              <span class="text-emerald-400 text-xs">Live Sync</span>
            </span>
          </p>
        </div>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button id="export-pdf" class="rounded-xl bg-emerald-500/20 px-4 py-2 text-sm font-semibold text-emerald-300 ring-1 ring-emerald-500/30 transition-all hover:ring-emerald-500/50">📄 PDF</button>
        <button id="export-csv" class="rounded-xl bg-blue-500/20 px-4 py-2 text-sm font-semibold text-blue-300 ring-1 ring-blue-500/30 transition-all hover:ring-blue-500/50">📊 CSV</button>
        <button id="clear-form" class="rounded-xl bg-rose-500/20 px-4 py-2 text-sm font-semibold text-rose-300 ring-1 ring-rose-500/30 transition-all hover:ring-rose-500/50">🗑️ Clear</button>
        <button id="logout-btn" class="rounded-xl bg-white/10 px-4 py-2 text-sm font-semibold text-white ring-1 ring-white/10 transition-all hover:bg-white/15">🚪 Logout</button>
      </div>
    </header>

    <div class="mb-8 grid gap-4 sm:grid-cols-3">
      <div class="glass rounded-2xl p-5"><p class="text-xs font-medium uppercase text-slate-500">Receipts</p><p id="stat-receipts" class="mt-1 text-2xl font-bold">0</p></div>
      <div class="glass rounded-2xl p-5"><p class="text-xs font-medium uppercase text-slate-500">Total Spent</p><p id="stat-total" class="mt-1 text-2xl font-bold text-emerald-400">₹0.00</p></div>
      <div class="glass rounded-2xl p-5"><p class="text-xs font-medium uppercase text-slate-500">Today</p><p id="stat-today" class="mt-1 text-2xl font-bold text-violet-400">₹0.00</p></div>
    </div>

    <div class="glass mb-8 rounded-3xl p-6 sm:p-8">
      <div class="mb-6 flex items-center gap-3">
        <span id="form-icon" class="text-2xl">➕</span>
        <h2 id="form-title" class="text-xl font-bold">New Receipt</h2>
        <button id="cancel-btn" class="ml-auto text-sm text-slate-400 hover:text-white hidden">Cancel</button>
      </div>
      <form id="receipt-form" class="grid gap-5 sm:grid-cols-2">
        <div class="sm:col-span-2">
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Name / Description</label>
          <input type="text" id="name" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="e.g., Groceries from BigBasket" required />
        </div>
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Amount (₹)</label>
          <input type="number" id="amount" inputmode="decimal" step="0.01" min="0" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="0.00" required />
        </div>
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Date</label>
          <input type="date" id="date" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" required />
          <p class="mt-1 text-xs text-indigo-400">Auto-filled with today's date</p>
        </div>
        <div class="sm:col-span-2">
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">UPI App</label>
          <select id="upi" class="glass-input w-full appearance-none rounded-xl px-4 py-3 pr-10 text-sm outline-none">
            <option value="Google Pay">💳 Google Pay (GPay)</option>
            <option value="PhonePe">📱 PhonePe</option>
            <option value="Paytm">💰 Paytm</option>
            <option value="BHIM">🏦 BHIM</option>
            <option value="Amazon Pay">🛒 Amazon Pay</option>
            <option value="WhatsApp Pay">💬 WhatsApp Pay</option>
            <option value="Cred">💎 Cred</option>
            <option value="Mobikwik">📲 Mobikwik</option>
            <option value="Freecharge">⚡ Freecharge</option>
            <option value="Airtel Payments Bank">📡 Airtel Payments Bank</option>
            <option value="Jio Payments Bank">🌐 Jio Payments Bank</option>
            <option value="Other UPI">🔗 Other UPI</option>
          </select>
        </div>
        <div class="sm:col-span-2">
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Note (optional)</label>
          <input type="text" id="note" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="Any extra info..." />
        </div>
        <div class="sm:col-span-2 flex justify-end gap-3 pt-2">
          <button type="button" id="reset-btn" class="rounded-xl px-5 py-2.5 text-sm font-semibold text-slate-400 transition-all hover:text-white">Reset</button>
          <button type="submit" class="rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-indigo-500/25 transition-all hover:shadow-indigo-500/40">Save Receipt</button>
        </div>
      </form>
    </div>

    <div id="search-section" class="mb-6 hidden flex-col gap-3 sm:flex-row">
      <div class="relative flex-1">
        <input type="text" id="search" class="glass-input w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none" placeholder="Search receipts..." />
        <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /></svg>
      </div>
      <select id="filter-upi" class="glass-input appearance-none rounded-xl px-4 py-3 pr-10 text-sm outline-none">
        <option value="All">🔍 All UPI</option>
        <option value="Google Pay">💳 Google Pay</option>
        <option value="PhonePe">📱 PhonePe</option>
        <option value="Paytm">💰 Paytm</option>
        <option value="BHIM">🏦 BHIM</option>
        <option value="Amazon Pay">🛒 Amazon Pay</option>
        <option value="WhatsApp Pay">💬 WhatsApp Pay</option>
        <option value="Cred">💎 Cred</option>
        <option value="Mobikwik">📲 Mobikwik</option>
        <option value="Freecharge">⚡ Freecharge</option>
        <option value="Airtel Payments Bank">📡 Airtel Payments Bank</option>
        <option value="Jio Payments Bank">🌐 Jio Payments Bank</option>
        <option value="Other UPI">🔗 Other UPI</option>
      </select>
    </div>

    <div id="receipts-list" class="space-y-3"></div>
    <footer id="footer-status" class="mt-12 text-center text-xs text-slate-600">Your data is private and stored securely</footer>
  </div>

  <!-- Firebase + jsPDF -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>

  <script>


    const firebaseConfig = {
  apiKey: "AIzaSyASojnLc0aE-fu9nBYk2bWOw-ND7-9CnwI",
  authDomain: "receiptsmgmt-74aa0.firebaseapp.com",
  projectId: "receiptsmgmt-74aa0",
  storageBucket: "receiptsmgmt-74aa0.firebasestorage.app",
  messagingSenderId: "664076894227",
  appId: "1:664076894227:web:d7355d16c45e3670157fe6"
    };



    let currentUser = null;
    let receipts = [];
    let editingId = null;
    let databaseRef = null;
    let firebaseReady = false;
    let isLoginMode = true;
    let skipNextSync = false;

    const today = new Date().toISOString().split('T')[0];

    function showToast(msg, color) {
      color = color || 'emerald';
      const toast = document.createElement('div');
      const c = { emerald:'bg-emerald-500/90', red:'bg-red-500/90', blue:'bg-blue-500/90', amber:'bg-amber-500/90' };
      toast.className = 'toast fixed top-4 left-1/2 z-[60] -translate-x-1/2 rounded-full ' + (c[color]) + ' px-6 py-2 text-sm font-medium text-white shadow-lg backdrop-blur';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function showAuthError(msg) {
      const err = document.getElementById('auth-error');
      err.textContent = msg;
      err.classList.remove('hidden');
      setTimeout(() => err.classList.add('hidden'), 5000);
    }

    function getFriendlyAuthError(err) {
      const code = err.code || '';
      if (code.includes('email-already-in-use')) return 'Email already registered. Please login instead.';
      if (code.includes('invalid-email')) return 'Please enter a valid email address.';
      if (code.includes('weak-password')) return 'Password is too weak. Use at least 6 characters.';
      if (code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return 'Invalid email or password.';
      if (code.includes('too-many-requests')) return 'Too many attempts. Try again later.';
      if (code.includes('network')) return 'Network error. Check your internet connection.';
      return err.message || 'Something went wrong. Try again.';
    }

    window.onload = function() {
      // Check Firebase config
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey === 'PASTE_HERE') {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('auth-screen').classList.add('flex');
        showAuthError('⚠️ Firebase not configured. Open the HTML file and paste your Firebase config at the top of the script.');
        document.getElementById('auth-form').style.pointerEvents = 'none';
        document.getElementById('auth-form').style.opacity = '0.5';
        return;
      }

      try {
        firebase.initializeApp(firebaseConfig);
        firebaseReady = true;
      } catch (err) {
        console.error(err);
        showAuthError('Firebase init failed: ' + err.message);
        return;
      }

      // Auth state listener
      firebase.auth().onAuthStateChanged(function(user) {
        document.getElementById('loading-screen').classList.add('hidden');

        if (user) {
          currentUser = user;
          showApp();
        } else {
          currentUser = null;
          showAuth();
        }
      });

      setupAuthListeners();
      setupAppListeners();
    };

    function showAuth() {
      document.getElementById('app').classList.add('hidden');
      document.getElementById('auth-screen').classList.remove('hidden');
      document.getElementById('auth-screen').classList.add('flex');
    }

    function showApp() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('auth-screen').classList.remove('flex');
      document.getElementById('app').classList.remove('hidden');

      const name = currentUser.displayName || currentUser.email.split('@')[0];
      document.getElementById('user-greeting').textContent = 'Hi, ' + name + ' 👋';
      document.getElementById('footer-status').innerHTML = '🔐 Logged in as <strong>' + currentUser.email + '</strong> · Your data is private';

      setupUserDatabase();
    }

    function localKey() {
      return 'receipts_' + (currentUser ? currentUser.uid : 'guest');
    }

    function setupUserDatabase() {
      if (databaseRef) databaseRef.off();

      // Load local backup first so data shows instantly
      try {
        const localData = JSON.parse(localStorage.getItem(localKey()) || '[]');
        if (localData.length > 0) {
          receipts = localData;
          renderReceipts();
          updateStats();
        }
      } catch (e) { console.warn('Local load failed', e); }

      // Each user has private data path: /users/{uid}/receipts
      databaseRef = firebase.database().ref('users/' + currentUser.uid + '/receipts');

      databaseRef.on('value', function(snapshot) {
        if (skipNextSync) {
          skipNextSync = false;
          return;
        }
        const data = snapshot.val();
        const remote = data ? Object.values(data) : [];
        // If cloud is empty but we have local data, push local up
        if (remote.length === 0 && receipts.length > 0) {
          databaseRef.set(receipts).catch(function(err){ console.error(err); });
          return;
        }
        receipts = remote;
        localStorage.setItem(localKey(), JSON.stringify(receipts));
        renderReceipts();
        updateStats();
      }, function(err) {
        console.error('DB read error:', err);
        showToast('Read blocked: ' + (err.code || err.message) + ' — check Database Rules', 'red');
      });

      document.getElementById('sync-indicator').classList.remove('hidden');
      document.getElementById('sync-indicator').classList.add('flex');
    }

    // ─────── AUTH HANDLERS ───────
    function setupAuthListeners() {
      document.getElementById('tab-login').addEventListener('click', function() {
        isLoginMode = true;
        document.getElementById('tab-login').className = 'rounded-lg py-2 text-sm font-semibold transition-all bg-indigo-600 text-white';
        document.getElementById('tab-signup').className = 'rounded-lg py-2 text-sm font-semibold transition-all text-slate-400 hover:text-white';
        document.getElementById('name-field').classList.add('hidden');
        document.getElementById('auth-submit').textContent = 'Login';
        document.getElementById('auth-subtitle').textContent = 'Welcome back!';
        document.getElementById('password-hint').textContent = 'Enter your password';
      });

      document.getElementById('tab-signup').addEventListener('click', function() {
        isLoginMode = false;
        document.getElementById('tab-signup').className = 'rounded-lg py-2 text-sm font-semibold transition-all bg-indigo-600 text-white';
        document.getElementById('tab-login').className = 'rounded-lg py-2 text-sm font-semibold transition-all text-slate-400 hover:text-white';
        document.getElementById('name-field').classList.remove('hidden');
        document.getElementById('auth-submit').textContent = 'Create Account';
        document.getElementById('auth-subtitle').textContent = 'Create your free account';
        document.getElementById('password-hint').textContent = 'Minimum 6 characters';
      });

      document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        const name = document.getElementById('auth-name').value.trim();
        const submitBtn = document.getElementById('auth-submit');
        submitBtn.disabled = true;
        submitBtn.textContent = isLoginMode ? 'Signing in...' : 'Creating account...';

        if (isLoginMode) {
          firebase.auth().signInWithEmailAndPassword(email, password)
            .then(function() {
              showToast('Welcome back!');
            })
            .catch(function(err) {
              showAuthError(getFriendlyAuthError(err));
            })
            .finally(function() {
              submitBtn.disabled = false;
              submitBtn.textContent = isLoginMode ? 'Login' : 'Create Account';
            });
        } else {
          firebase.auth().createUserWithEmailAndPassword(email, password)
            .then(function(cred) {
              if (name) {
                return cred.user.updateProfile({ displayName: name });
              }
            })
            .then(function() {
              showToast('Account created! 🎉');
            })
            .catch(function(err) {
              showAuthError(getFriendlyAuthError(err));
            })
            .finally(function() {
              submitBtn.disabled = false;
              submitBtn.textContent = isLoginMode ? 'Login' : 'Create Account';
            });
        }
      });

      document.getElementById('forgot-password').addEventListener('click', function() {
        const email = document.getElementById('auth-email').value.trim();
        if (!email) {
          showAuthError('Enter your email above first');
          return;
        }
        firebase.auth().sendPasswordResetEmail(email)
          .then(function() {
            showToast('Password reset email sent to ' + email);
          })
          .catch(function(err) {
            showAuthError(getFriendlyAuthError(err));
          });
      });
    }

    // ─────── APP HANDLERS ───────
    function setupAppListeners() {
      const nameInput = document.getElementById('name');
      const amountInput = document.getElementById('amount');
      const dateInput = document.getElementById('date');
      const upiSelect = document.getElementById('upi');
      const noteInput = document.getElementById('note');
      const form = document.getElementById('receipt-form');
      const cancelBtn = document.getElementById('cancel-btn');
      const searchInput = document.getElementById('search');
      const filterUpi = document.getElementById('filter-upi');

      dateInput.value = today;

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!nameInput.value.trim() || !amountInput.value || Number(amountInput.value) <= 0) {
          showToast('Please enter name and amount', 'red');
          return;
        }
        if (editingId) {
          receipts = receipts.map(function(r) {
            return r.id === editingId ? Object.assign({}, r, {
              name: nameInput.value.trim(),
              amount: Number(amountInput.value),
              date: dateInput.value,
              upi: upiSelect.value,
              note: noteInput.value.trim()
            }) : r;
          });
          showToast('Receipt updated!');
        } else {
          const newR = {
            id: 'r_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
            name: nameInput.value.trim(),
            amount: Number(amountInput.value),
            date: dateInput.value,
            upi: upiSelect.value,
            note: noteInput.value.trim()
          };
          receipts.unshift(newR);
          showToast('Receipt saved!');
        }
        resetForm();
        saveAndRender();
      });

      window.editReceipt = function(id) {
        const r = receipts.find(function(x) { return x.id === id; });
        if (!r) return;
        editingId = id;
        nameInput.value = r.name;
        amountInput.value = r.amount;
        dateInput.value = r.date;
        upiSelect.value = r.upi;
        noteInput.value = r.note || '';
        document.getElementById('form-icon').textContent = '✏️';
        document.getElementById('form-title').textContent = 'Edit Receipt';
        cancelBtn.classList.remove('hidden');
        document.getElementById('receipt-form').scrollIntoView({ behavior: 'smooth' });
      };

      window.deleteReceipt = function(id) {
        if (!confirm('Delete this receipt?')) return;
        receipts = receipts.filter(function(r) { return r.id !== id; });
        if (editingId === id) resetForm();
        saveAndRender();
        showToast('Receipt deleted', 'amber');
      };

      document.getElementById('reset-btn').addEventListener('click', function() { resetForm(); showToast('Form cleared', 'blue'); });
      document.getElementById('cancel-btn').addEventListener('click', resetForm);
      document.getElementById('clear-form').addEventListener('click', function() { resetForm(); showToast('Form cleared', 'blue'); });

      // Logout
      document.getElementById('logout-btn').addEventListener('click', function() {
        if (!confirm('Logout from this account?')) return;
        if (databaseRef) databaseRef.off();
        firebase.auth().signOut().then(function() {
          receipts = [];
          editingId = null;
          // Reset form fields
          document.getElementById('auth-email').value = '';
          document.getElementById('auth-password').value = '';
          document.getElementById('auth-name').value = '';
          document.getElementById('sync-indicator').classList.add('hidden');
          document.getElementById('sync-indicator').classList.remove('flex');
          showToast('Logged out');
        });
      });

      searchInput.addEventListener('input', renderReceipts);
      filterUpi.addEventListener('change', renderReceipts);

      // Export PDF
      document.getElementById('export-pdf').addEventListener('click', exportPDF);
      document.getElementById('export-csv').addEventListener('click', exportCSV);
    }

    function resetForm() {
      document.getElementById('name').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('date').value = today;
      document.getElementById('upi').value = 'Google Pay';
      document.getElementById('note').value = '';
      editingId = null;
      document.getElementById('form-icon').textContent = '➕';
      document.getElementById('form-title').textContent = 'New Receipt';
      document.getElementById('cancel-btn').classList.add('hidden');
    }

    function saveAndRender() {
      // ALWAYS save locally first (guaranteed backup)
      try {
        localStorage.setItem(localKey(), JSON.stringify(receipts));
      } catch (e) { console.warn('Local save failed', e); }

      // Then sync to Firebase cloud
      if (databaseRef) {
        skipNextSync = true;
        databaseRef.set(receipts)
          .then(function() {
            console.log('✅ Saved to cloud');
          })
          .catch(function(err) {
            skipNextSync = false; // reset so listener works again
            console.error('Cloud save failed:', err);
            showToast('Cloud save blocked: ' + (err.code || err.message) + ' — saved locally only', 'red');
          });
      } else {
        showToast('Not connected to cloud — saved locally', 'amber');
      }
      renderReceipts();
      updateStats();
    }

    function formatAmount(n) {
      return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 }).format(n);
    }
    function formatAmountPlain(n) {
      return 'Rs. ' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function formatDate(iso) {
      try { return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' }); } catch { return iso; }
    }
    function formatDateShort(iso) {
      try { return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); } catch { return iso; }
    }
    function getUpiEmoji(upi) {
      return ({ "Google Pay":"💳","PhonePe":"📱","Paytm":"💰","BHIM":"🏦","Amazon Pay":"🛒","WhatsApp Pay":"💬","Cred":"💎","Mobikwik":"📲","Freecharge":"⚡","Airtel Payments Bank":"📡","Jio Payments Bank":"🌐","Other UPI":"🔗" })[upi] || "🔗";
    }

    function updateStats() {
      const total = receipts.reduce(function(s, r) { return s + (Number(r.amount) || 0); }, 0);
      const todayT = receipts.filter(function(r) { return r.date === today; }).reduce(function(s, r) { return s + (Number(r.amount) || 0); }, 0);
      document.getElementById('stat-receipts').textContent = receipts.length;
      document.getElementById('stat-total').textContent = formatAmount(total);
      document.getElementById('stat-today').textContent = formatAmount(todayT);
    }

    function renderReceipts() {
      const searchInput = document.getElementById('search');
      const filterUpi = document.getElementById('filter-upi');
      const search = searchInput.value.toLowerCase();
      const filter = filterUpi.value;

      const filtered = receipts.filter(function(r) {
        return (!search || r.name.toLowerCase().includes(search) || r.upi.toLowerCase().includes(search) || (r.note || '').toLowerCase().includes(search)) &&
               (filter === 'All' || r.upi === filter);
      }).sort(function(a, b) { return a.date < b.date ? 1 : -1; });

      const searchSection = document.getElementById('search-section');
      searchSection.style.display = receipts.length === 0 ? 'none' : 'flex';

      const receiptsList = document.getElementById('receipts-list');

      if (filtered.length === 0) {
        receiptsList.innerHTML = '<div class="glass rounded-3xl p-12 text-center"><div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-500/20 text-3xl">' + (receipts.length === 0 ? '🧾' : '🔍') + '</div><p class="text-lg font-semibold text-white/80">' + (receipts.length === 0 ? 'No receipts yet' : 'No matching receipts') + '</p><p class="mt-1 text-sm text-slate-500">' + (receipts.length === 0 ? 'Add your first receipt above' : 'Try a different search') + '</p></div>';
        return;
      }

      receiptsList.innerHTML = filtered.map(function(r) {
        return '<div class="flex items-center justify-between rounded-2xl border border-white/5 bg-white/5 p-4 backdrop-blur transition-all hover:border-white/10 hover:bg-white/8 sm:p-5">' +
          '<div class="flex items-start gap-3 flex-1 min-w-0">' +
          '<div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-white/5 text-lg ring-1 ring-white/10">' + getUpiEmoji(r.upi) + '</div>' +
          '<div class="min-w-0 flex-1">' +
          '<div class="flex flex-wrap items-center gap-2"><h3 class="truncate font-semibold text-white">' + r.name + '</h3><span class="rounded-full bg-white/5 px-2.5 py-0.5 text-xs font-medium ring-1 ring-white/10">' + r.upi + '</span></div>' +
          '<div class="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-500"><span>' + formatDate(r.date) + '</span>' +
          (r.note ? '<span class="text-slate-600">• ' + r.note + '</span>' : '') + '</div></div></div>' +
          '<div class="flex items-center gap-4"><span class="text-xl font-bold text-white">' + formatAmount(r.amount) + '</span>' +
          '<div class="flex gap-1">' +
          '<button onclick="window.editReceipt(\'' + r.id + '\')" class="rounded-lg p-2 text-slate-400 transition-all hover:bg-indigo-500/20 hover:text-indigo-300"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg></button>' +
          '<button onclick="window.deleteReceipt(\'' + r.id + '\')" class="rounded-lg p-2 text-slate-400 transition-all hover:bg-rose-500/20 hover:text-rose-300"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m-9 4v10a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V10"/></svg></button>' +
          '</div></div></div>';
      }).join('');
    }

    function exportPDF() {
      if (receipts.length === 0) { showToast('No receipts to export', 'red'); return; }
      try {
        const jsPDFConstructor = window.jspdf ? window.jspdf.jsPDF : window.jsPDF;
        if (!jsPDFConstructor) { showToast('PDF library not loaded', 'red'); return; }
        const doc = new jsPDFConstructor({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pw = doc.internal.pageSize.getWidth();

        doc.setFillColor(99, 102, 241); doc.rect(0, 0, pw, 35, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont('helvetica', 'bold');
        doc.text('Receipt Report', 14, 20);
        doc.setFontSize(10); doc.setFont('helvetica', 'normal');
        doc.text((currentUser.displayName || currentUser.email) + "'s Payment Summary", 14, 28);

        const totalA = receipts.reduce(function(s, r) { return s + Number(r.amount); }, 0);
        const todayA = receipts.filter(function(r) { return r.date === today; }).reduce(function(s, r) { return s + Number(r.amount); }, 0);

        doc.setFillColor(248, 250, 252); doc.roundedRect(14, 42, pw - 28, 25, 3, 3, 'F');
        doc.setTextColor(71, 85, 105); doc.setFontSize(9);
        doc.text('TOTAL AMOUNT', 20, 50);
        doc.setTextColor(30, 41, 59); doc.setFontSize(14); doc.setFont('helvetica', 'bold');
        doc.text(formatAmountPlain(totalA), 20, 60);
        doc.setTextColor(71, 85, 105); doc.setFontSize(9); doc.setFont('helvetica', 'normal');
        doc.text('RECEIPTS', pw/2, 50);
        doc.setTextColor(30, 41, 59); doc.setFontSize(14); doc.setFont('helvetica', 'bold');
        doc.text(receipts.length.toString(), pw/2, 60);
        doc.setTextColor(71, 85, 105); doc.setFontSize(9); doc.setFont('helvetica', 'normal');
        doc.text("TODAY'S SPEND", pw - 50, 50);
        doc.setTextColor(30, 41, 59); doc.setFontSize(14); doc.setFont('helvetica', 'bold');
        doc.text(formatAmountPlain(todayA), pw - 50, 60);

        const tableData = receipts.slice().sort(function(a, b) { return a.date < b.date ? 1 : -1; }).map(function(r) {
          return [r.name.length > 30 ? r.name.substring(0,30)+'...' : r.name, formatAmountPlain(r.amount), formatDateShort(r.date), r.upi];
        });

        doc.autoTable({
          startY: 75,
          head: [['Description', 'Amount', 'Date', 'UPI App']],
          body: tableData,
          theme: 'grid',
          headStyles: { fillColor: [30, 41, 59], textColor: 255, fontSize: 10, fontStyle: 'bold', halign: 'center' },
          bodyStyles: { fontSize: 9, cellPadding: 3 },
          alternateRowStyles: { fillColor: [248, 250, 252] },
          columnStyles: { 0: { cellWidth: 75 }, 1: { cellWidth: 40, halign: 'right', fontStyle: 'bold' }, 2: { cellWidth: 35, halign: 'center' }, 3: { cellWidth: 35 } },
          margin: { left: 14, right: 14 }
        });

        const pc = doc.internal.getNumberOfPages();
        for (var i = 1; i <= pc; i++) {
          doc.setPage(i); doc.setFontSize(8); doc.setTextColor(100, 116, 139);
          doc.text('Page ' + i + ' of ' + pc, pw/2, doc.internal.pageSize.getHeight() - 10, { align: 'center' });
        }

        doc.save('receipts-' + today + '.pdf');
        showToast('PDF downloaded!');
      } catch (err) { console.error(err); showToast('PDF failed: ' + err.message, 'red'); }
    }

    function exportCSV() {
      if (receipts.length === 0) { showToast('No receipts to export', 'red'); return; }
      try {
        const headers = ['Name', 'Amount', 'Date', 'UPI App', 'Note'];
        const rows = receipts.map(function(r) {
          return ['"' + r.name.replace(/"/g, '""') + '"', r.amount, r.date, '"' + r.upi + '"', '"' + (r.note || '').replace(/"/g, '""') + '"'].join(',');
        });
        const csv = [headers.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'receipts-' + today + '.csv'; a.click();
        URL.revokeObjectURL(url);
        showToast('CSV downloaded!');
      } catch (err) { showToast('CSV failed', 'red'); }
    }
  </script>
</body>
</html>
