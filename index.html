<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #0b0f1a 0%, #0d1525 20%, #111b33 40%, #0f1a30 60%, #0b1222 80%, #0b0f1a 100%); min-height: 100vh; color: #e2e8f0; }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
    .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; }
    .glass-input:focus { background: rgba(255,255,255,0.08); border-color: rgba(129,140,248,0.6); box-shadow: 0 0 0 3px rgba(129,140,248,0.15); }
    .glass-input::placeholder { color: rgba(148,163,184,0.6); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    .toast { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-40 -left-40 h-96 w-96 rounded-full bg-indigo-500/10 blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 h-96 w-96 rounded-full bg-violet-500/10 blur-3xl"></div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
    <div class="glass rounded-3xl p-8 max-w-md w-full">
      <div class="text-center mb-6">
        <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 shadow-xl shadow-indigo-500/20 mb-4">
          <svg class="h-8 w-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2h16v20l-4-2-4 2-4-2-4 2z" /><path d="M8 10h8M8 14h5" /></svg>
        </div>
        <h1 class="text-2xl font-extrabold text-white">Receipt Manager</h1>
        <p class="text-sm text-slate-400 mt-1">Sign in to sync across all devices</p>
      </div>
      <form id="auth-form" class="space-y-3">
        <input type="email" id="auth-email" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="Email" required />
        <input type="password" id="auth-password" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="Password (min 6 chars)" required minlength="6" />
        <div class="flex gap-2 pt-2">
          <button type="submit" id="login-btn" class="flex-1 rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-3 text-sm font-bold text-white shadow-lg shadow-indigo-500/25">Login</button>
          <button type="button" id="signup-btn" class="flex-1 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-600 px-4 py-3 text-sm font-bold text-white shadow-lg shadow-emerald-500/25">Sign Up</button>
        </div>
      </form>
      <div id="auth-error" class="hidden mt-3 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-xs text-red-300"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="relative z-10 mx-auto max-w-4xl px-4 py-8 hidden">
    <header class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-4">
        <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 shadow-xl shadow-indigo-500/20">
          <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2h16v20l-4-2-4 2-4-2-4 2z" /><path d="M8 10h8M8 14h5" /></svg>
        </div>
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white to-indigo-200 bg-clip-text text-transparent flex items-center gap-2">
            Receipt Manager
            <span id="live-badge" class="hidden items-center gap-1 px-2 py-0.5 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-[10px] font-bold text-emerald-300">
              <span class="sync-dot bg-emerald-400"></span> LIVE
            </span>
          </h1>
          <p class="text-sm text-slate-400" id="user-info">Loading...</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button id="logout-btn" class="rounded-xl bg-white/10 px-4 py-2 text-sm font-semibold text-white ring-1 ring-white/10 hover:bg-white/15">Logout</button>
      </div>
    </header>

    <div class="mb-8 grid gap-4 sm:grid-cols-3">
      <div class="glass rounded-2xl p-5"><p class="text-xs font-medium uppercase text-slate-500">Receipts</p><p id="stat-receipts" class="mt-1 text-2xl font-bold">0</p></div>
      <div class="glass rounded-2xl p-5"><p class="text-xs font-medium uppercase text-slate-500">Total Spent</p><p id="stat-total" class="mt-1 text-2xl font-bold text-emerald-400">₹0.00</p></div>
      <div class="glass rounded-2xl p-5"><p class="text-xs font-medium uppercase text-slate-500">Today</p><p id="stat-today" class="mt-1 text-2xl font-bold text-violet-400">₹0.00</p></div>
    </div>

    <div class="glass mb-8 rounded-3xl p-6 sm:p-8">
      <h2 class="text-xl font-bold mb-6">Add New Receipt</h2>
      <form id="receipt-form" class="grid gap-5 sm:grid-cols-2">
        <div class="sm:col-span-2">
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Name / Description</label>
          <input type="text" id="name" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="e.g., Groceries from BigBasket" required />
        </div>
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Amount (₹)</label>
          <input type="number" id="amount" inputmode="decimal" step="0.01" min="0" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="0.00" required />
        </div>
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Date</label>
          <input type="date" id="date" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" required />
          <p class="mt-1 text-xs text-indigo-400">Auto-filled with today's date</p>
        </div>
        <div class="sm:col-span-2">
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">UPI App</label>
          <select id="upi" class="glass-input w-full appearance-none rounded-xl px-4 py-3 pr-10 text-sm outline-none">
            <option value="Google Pay">💳 Google Pay (GPay)</option>
            <option value="PhonePe">📱 PhonePe</option>
            <option value="Paytm">💰 Paytm</option>
            <option value="BHIM">🏦 BHIM</option>
            <option value="Amazon Pay">🛒 Amazon Pay</option>
            <option value="WhatsApp Pay">💬 WhatsApp Pay</option>
            <option value="Cred">💎 Cred</option>
            <option value="Other UPI">🔗 Other UPI</option>
          </select>
        </div>
        <div class="sm:col-span-2">
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Note (optional)</label>
          <input type="text" id="note" class="glass-input w-full rounded-xl px-4 py-3 text-sm outline-none" placeholder="Any extra info..." />
        </div>
        <div class="sm:col-span-2 flex justify-end gap-3 pt-2">
          <button type="button" id="reset-btn" class="rounded-xl px-5 py-2.5 text-sm font-semibold text-slate-400 hover:text-white">Reset</button>
          <button type="submit" class="rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40">Save Receipt</button>
        </div>
      </form>
    </div>

    <div id="receipts-list" class="space-y-3"></div>
    <footer class="mt-12 text-center text-xs text-slate-600">🔄 Live sync active — changes appear instantly on all devices</footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    // ╔══════════════════════════════════════════════════════════════╗
    // ║  YOUR FIREBASE CONFIG                                        ║
    // ╚══════════════════════════════════════════════════════════════╝
    const firebaseConfig = {
      apiKey: "AIzaSyASojnLc0aE-fu9nBYk2bWOw-ND7-9CnwI",
      authDomain: "receiptsmgmt-74aa0.firebaseapp.com",
      databaseURL: "https://receiptsmgmt-74aa0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "receiptsmgmt-74aa0",
      storageBucket: "receiptsmgmt-74aa0.firebasestorage.app",
      messagingSenderId: "664076894227",
      appId: "1:664076894227:web:d7355d16c45e3670157fe6"
    };
    // ═══════════════════════════════════════════════════════════════

    try {
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      console.error(e);
    }

    const auth = firebase.auth();
    const db = firebase.database();

    let myRef = null;
    let receipts = [];
    let localWrite = false;
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;

    function toast(msg, color = 'emerald') {
      const t = document.createElement('div');
      const c = { emerald: 'bg-emerald-500/90', red: 'bg-red-500/90', blue: 'bg-blue-500/90', amber: 'bg-amber-500/90' };
      t.className = 'toast fixed top-4 left-1/2 z-[60] -translate-x-1/2 rounded-full ' + (c[color]) + ' px-6 py-2 text-sm font-medium text-white shadow-lg';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function showAuthError(msg) {
      const e = document.getElementById('auth-error');
      e.textContent = msg;
      e.classList.remove('hidden');
      setTimeout(() => e.classList.add('hidden'), 5000);
    }

    const formatAmount = (n) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 }).format(n);
    const formatDate = (iso) => { try { return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' }); } catch { return iso; } };
    const getUpiEmoji = (upi) => ({ "Google Pay": "💳", "PhonePe": "📱", "Paytm": "💰", "BHIM": "🏦", "Amazon Pay": "🛒", "WhatsApp Pay": "💬", "Cred": "💎", "Other UPI": "🔗" })[upi] || "🔗";

    // AUTH listener
    auth.onAuthStateChanged((user) => {
      if (user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('user-info').textContent = user.email;
        document.getElementById('live-badge').classList.remove('hidden');
        document.getElementById('live-badge').classList.add('flex');
        setupSync(user.uid);
      } else {
        if (myRef) { myRef.off(); myRef = null; }
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        receipts = [];
        render();
      }
    });

    function setupSync(uid) {
      const path = 'users/' + uid + '/receipts';
      myRef = db.ref(path);

      // Live listener
      myRef.on('value', (snap) => {
        if (localWrite) { localWrite = false; return; }
        const data = snap.val();
        receipts = data ? Object.values(data) : [];
        render();
        updateStats();
        toast('Synced', 'blue');
      }, (err) => {
        console.error('DB error:', err);
        showAuthError('DB error: ' + err.message);
      });
    }

    // Auth handlers
    document.getElementById('auth-form').addEventListener('submit', (e) => {
      e.preventDefault();
      login();
    });

    document.getElementById('login-btn').onclick = login;
    document.getElementById('signup-btn').onclick = () => {
      const email = document.getElementById('auth-email').value;
      const pass = document.getElementById('auth-password').value;
      if (pass.length < 6) { showAuthError('Password must be 6+ characters'); return; }
      auth.createUserWithEmailAndPassword(email, pass)
        .then(() => toast('Account created!'))
        .catch(err => showAuthError(err.message));
    };

    function login() {
      const email = document.getElementById('auth-email').value;
      const pass = document.getElementById('auth-password').value;
      auth.signInWithEmailAndPassword(email, pass)
        .then(() => toast('Welcome!'))
        .catch(err => showAuthError(err.message));
    }

    document.getElementById('logout-btn').onclick = () => {
      auth.signOut().then(() => toast('Logged out', 'blue'));
    };

    // Save receipt
    document.getElementById('receipt-form').onsubmit = (e) => {
      e.preventDefault();
      if (!myRef) { showAuthError('Not logged in', 'red'); return; }
      
      const newR = {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        name: document.getElementById('name').value.trim(),
        amount: parseFloat(document.getElementById('amount').value),
        date: document.getElementById('date').value,
        upi: document.getElementById('upi').value,
        note: document.getElementById('note').value.trim()
      };
      
      if (!newR.name || !newR.amount || !newR.date) { 
        toast('Please fill name, amount, date', 'red'); 
        return; 
      }
      
      receipts.unshift(newR);
      localWrite = true;
      myRef.set(receipts)
        .then(() => {
          toast('Saved! Synced to all devices');
          e.target.reset();
          document.getElementById('date').value = today;
          render();
          updateStats();
        })
        .catch(err => toast('Save failed: ' + err.message, 'red'));
    };

    document.getElementById('reset-btn').onclick = () => {
      document.getElementById('name').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('note').value = '';
      document.getElementById('date').value = today;
      toast('Form cleared', 'blue');
    };

    // Delete
    window.deleteReceipt = (id) => {
      if (!confirm('Delete this receipt?')) return;
      receipts = receipts.filter(r => r.id !== id);
      localWrite = true;
      myRef.set(receipts)
        .then(() => { render(); updateStats(); toast('Deleted', 'amber'); });
    };

    function updateStats() {
      const total = receipts.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
      const todayTotal = receipts.filter(r => r.date === today).reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
      document.getElementById('stat-receipts').textContent = receipts.length;
      document.getElementById('stat-total').textContent = formatAmount(total);
      document.getElementById('stat-today').textContent = formatAmount(todayTotal);
    }

    function render() {
      const list = document.getElementById('receipts-list');
      if (receipts.length === 0) {
        list.innerHTML = `<div class="glass rounded-3xl p-12 text-center">
          <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-500/20 text-3xl">🧾</div>
          <p class="text-lg font-semibold text-white/80">No receipts yet</p>
          <p class="mt-1 text-sm text-slate-500">Add your first receipt above</p>
        </div>`;
        return;
      }

      const sorted = [...receipts].sort((a, b) => a.date < b.date ? 1 : -1);
      list.innerHTML = sorted.map(r => `
        <div class="flex items-center justify-between rounded-2xl border border-white/5 bg-white/5 p-4 backdrop-blur transition-all hover:border-white/10 hover:bg-white/8 sm:p-5">
          <div class="flex items-start gap-3 flex-1 min-w-0">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-white/5 text-lg ring-1 ring-white/10">${getUpiEmoji(r.upi)}</div>
            <div class="min-w-0 flex-1">
              <div class="flex flex-wrap items-center gap-2">
                <h3 class="truncate font-semibold text-white">${r.name}</h3>
                <span class="rounded-full bg-white/5 px-2.5 py-0.5 text-xs font-medium ring-1 ring-white/10">${r.upi}</span>
              </div>
              <div class="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-500">
                <span>${formatDate(r.date)}</span>
                ${r.note ? `<span class="text-slate-600">• ${r.note}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <span class="text-xl font-bold text-white">${formatAmount(r.amount)}</span>
            <button onclick="deleteReceipt('${r.id}')" class="rounded-lg p-2 text-slate-400 hover:bg-rose-500/20 hover:text-rose-300">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m-9 4v10a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V10"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
